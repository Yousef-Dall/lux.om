name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Test, typecheck, and build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lux_om_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d lux_om_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Create isolated test environment
        shell: bash
        run: |
          cat > backend/.env.test <<'ENV'
          NODE_ENV="test"
          PORT="4100"
          DATABASE_URL="postgresql://postgres:postgres@localhost:5433/lux_om_test?schema=public"
          JWT_SECRET="github-actions-test-secret-at-least-24-characters"
          CORS_ORIGIN="http://localhost:5173"
          STORAGE_DRIVER="local"
          UPLOAD_DIR="uploads-test"
          MAX_UPLOAD_MB="5"
          ENV

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Verify generated CRM contracts
        run: npm run contracts:crm:check

      - name: Lint frontend code and styles
        run: npm run lint

      - name: Check controlled formatting baseline
        run: npm run format:check

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Run unit and integration tests
        run: npm run test:all

      - name: Run TypeScript checks
        run: npm run typecheck

      - name: Build production application
        run: npm run build
